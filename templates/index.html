<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>WatchToRead</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #F7F7F5;
      color: #1A1A1A;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 2rem;
    }

    .card {
      background: white;
      border-radius: 16px;
      padding: 3rem;
      width: 100%;
      max-width: 540px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.06);
    }

    h1 {
      font-size: 1.8rem;
      font-weight: 700;
      margin-bottom: 0.4rem;
    }

    .subtitle {
      color: #888;
      font-size: 0.95rem;
      margin-bottom: 2rem;
    }

    label {
      display: block;
      font-size: 0.85rem;
      font-weight: 600;
      color: #555;
      margin-bottom: 0.4rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    input[type="text"] {
      width: 100%;
      padding: 0.75rem 1rem;
      border: 1.5px solid #E0E0E0;
      border-radius: 8px;
      font-size: 0.95rem;
      outline: none;
      transition: border 0.2s;
      margin-bottom: 1.25rem;
    }

    input[type="text"]:focus {
      border-color: #1A1A1A;
    }

    .difficulty-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.6rem;
      margin-bottom: 1.75rem;
    }

    .difficulty-btn {
      padding: 0.65rem;
      border: 1.5px solid #E0E0E0;
      border-radius: 8px;
      background: white;
      font-size: 0.9rem;
      cursor: pointer;
      transition: all 0.15s;
      text-align: center;
    }

    .difficulty-btn:hover {
      border-color: #1A1A1A;
    }

    .difficulty-btn.selected {
      background: #1A1A1A;
      color: white;
      border-color: #1A1A1A;
    }

    button[type="submit"] {
      width: 100%;
      padding: 0.85rem;
      background: #1A1A1A;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    button[type="submit"]:hover { opacity: 0.85; }
    button[type="submit"]:disabled { opacity: 0.4; cursor: not-allowed; }

    .status {
      margin-top: 1.25rem;
      font-size: 0.9rem;
      color: #888;
      text-align: center;
      min-height: 1.2rem;
    }

    .status.error { color: #E53E3E; }
    .status.success { color: #38A169; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Watch To Read</h1>
    <p class="subtitle">Turn any YouTube video into a structured eBook</p>

    <label for="url">YouTube URL</label>
    <input type="text" id="url" placeholder="https://www.youtube.com/watch?v=..." />

    <label>Audience Level</label>
    <div class="difficulty-grid">
      <div class="difficulty-btn" data-value="eli5">🟢 ELI5</div>
      <div class="difficulty-btn selected" data-value="beginner">🔵 Beginner</div>
      <div class="difficulty-btn" data-value="intermediate">🟡 Intermediate</div>
      <div class="difficulty-btn" data-value="expert">🔴 Expert</div>
    </div>

    <button type="submit" id="submit-btn" onclick="generate()">Generate eBook</button>
    <div class="status" id="status"></div>
  </div>

  <script>
    let selectedDifficulty = "beginner";

    document.querySelectorAll(".difficulty-btn").forEach(btn => {
      btn.addEventListener("click", () => {
        document.querySelectorAll(".difficulty-btn").forEach(b => b.classList.remove("selected"));
        btn.classList.add("selected");
        selectedDifficulty = btn.dataset.value;
      });
    });

    async function generate() {
      const url = document.getElementById("url").value.trim();
      const btn = document.getElementById("submit-btn");
      const status = document.getElementById("status");

      if (!url) {
        status.textContent = "Please enter a YouTube URL.";
        status.className = "status error";
        return;
      }

      btn.disabled = true;
      status.textContent = "Fetching transcript and generating eBook... this may take 20-30 seconds.";
      status.className = "status";

      try {
        const res = await fetch("/generate", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ url, difficulty: selectedDifficulty })
        });

        if (!res.ok) {
          const err = await res.json();
          throw new Error(err.error || "Something went wrong");
        }

        // Trigger PDF download
        const blob = await res.blob();
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = "ebook.pdf";
        link.click();

        status.textContent = "Your eBook is ready!";
        status.className = "status success";
      } catch (e) {
        status.textContent = e.message;
        status.className = "status error";
      } finally {
        btn.disabled = false;
      }
    }
  </script>
</body>
</html>
